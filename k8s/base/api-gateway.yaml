---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: fashion-trends
data:
  NODE_ENV: production
  PORT: "3000"
  LOG_LEVEL: info
  IMAGE_PROCESSOR_URL: http://image-processor:8080
  ML_ANALYSIS_URL: http://ml-analysis:8000
  ALLOWED_ORIGINS: "http://localhost:3001,http://frontend:3000"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: fashion-trends
  labels:
    app: api-gateway
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
    spec:
      containers:
        - name: api-gateway
          image: fashion-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: api-gateway-config
          env:
            # These come from secrets, not ConfigMap (sensitive values)
            - name: DATABASE_URL
              value: "postgresql://fashion_user:fashion_password@postgres:5432/fashion_trends"
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Readiness: check DB and Redis before accepting traffic
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Liveness: basic process check
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5

---
# LoadBalancer service: exposes API to external traffic
# In production, use Ingress + ClusterIP instead of LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: fashion-trends
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000

---
# HPA: auto-scale 2-10 replicas based on CPU
# 70% CPU target: scale up before saturation to maintain low latency
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: fashion-trends
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
