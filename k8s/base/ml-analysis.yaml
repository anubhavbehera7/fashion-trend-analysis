---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-analysis
  namespace: fashion-trends
  labels:
    app: ml-analysis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ml-analysis
  template:
    metadata:
      labels:
        app: ml-analysis
    spec:
      containers:
        - name: ml-analysis
          image: fashion-ml-analysis:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://fashion_user:fashion_password@postgres:5432/fashion_trends"
            - name: QDRANT_URL
              value: "http://qdrant:6333"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"   # scikit-learn DBSCAN can be memory-intensive for large datasets
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: ml-analysis
  namespace: fashion-trends
spec:
  selector:
    app: ml-analysis
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ml-analysis-hpa
  namespace: fashion-trends
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ml-analysis
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
